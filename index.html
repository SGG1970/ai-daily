<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070912;--s1:rgba(16,20,38,.55);--s2:#11162b;--s3:#192045;--b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--t:#e6eaf4;--t2:rgba(255,255,255,.52);--t3:rgba(255,255,255,.28);--p:#7c5cfc;--c:#00d4c8;--k:#f472b6;--g:#fbbf24;--o:#ff6600}

.mh{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1)}

.mb{padding:18px 20px;font-size:13px;line-height:1.8;color:var(--t2);white-space:pre-wrap;min-height:100px}
.tc{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ts{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:500;backdrop-filter:blur(12px);box-shadow:0 6px 24px rgba(0,0,0,.35);animation:te .3s ease;display:flex;align-items:center;gap:7px;pointer-events:auto}
.ts-i{background:rgba(16,20,38,.95);border:1px solid var(--b1);color:var(--t)}
.ts-s{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.ts-e{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171}
@keyframes te{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.ts-l{animation:tl .3s ease forwards}@keyframes tl{to{opacity:0;transform:translateY(-10px)}}
.ft{text-align:center;padding:16px 0 8px;font-size:10px;color:var(--t3);border-top:1px solid var(--b1);margin-top:20px;line-height:1.8}
.ft a{color:var(--t2);text-decoration:none}.ft a:hover{color:var(--p)}
@media(max-width:640px){.app{padding:10px 10px 44px}.hdr{padding:12px 14px;border-radius:9px}.hl h1{font-size:16px}.hl .lg{width:30px;height:30px;font-size:15px}.db{font-size:10px;padding:4px 8px}.st{grid-template-columns:repeat(2,1fr);gap:6px}.sc{padding:10px 8px}.sc .n{font-size:18px}.t{font-size:11px;padding:8px 8px}.cd{padding:12px 14px 12px 16px}.cd .ti{font-size:13px}.stg-p{right:10px;bottom:68px;width:calc(100vw - 20px)}.stg-btn{bottom:12px;right:12px;width:38px;height:38px;font-size:16px}.mw{margin:8px}.mb{padding:14px;font-size:12px}}
</style>
</head>
<body>

<script>
var CATS=[{name:"今日头条",icon:"🔥",keywords:[]},{name:"智能体应用",icon:"🤖",keywords:["AI agent","autonomous agent","agent framework","MCP protocol","function calling","tool use","multi-agent","Copilot","AI assistant","agentic AI"]},{name:"工作流开发",icon:"⚙️",keywords:["AI workflow","LLM pipeline","LangChain","RAG","vector database","prompt engineering","AI automation","orchestration","AI toolchain","workflow automation"]},{name:"AI前沿",icon:"🚀",keywords:["large language model","GPT","multimodal","foundation model","AGI","AI research","transformer","AI training","open source AI","alignment","deep learning breakthrough"]}];
var st={data:[[],[],[],[]],tab:0,loading:false,settings:{apiUrl:"http://localhost:11434",model:"qwen2.5:7b",format:"ollama"}};
async function h(q,n){n=n||10;var r=await fetch("https://hn.algolia.com/api/v1/search?query="+encodeURIComponent(q)+"&tags=story&hitsPerPage="+n,{signal:AbortSignal.timeout(8000)});var d=await r.json();return(d.hits||[]).map(function(h){return{title:h.title||h.story_title||"",url:h.url||"https://news.ycombinator.com/item?id="+h.objectID,desc:h.story_text?h.story_text.replace(/<[^>]+>/g,"").slice(0,200):"",source:"HackerNews",srcCls:"sr-hn",time:new Date(h.created_at).getTime(),score:h.points||0,author:h.author||""};});}
async function ht(n){n=Math.min(n||30,100);var r=await fetch("https://hacker-news.firebaseio.com/v0/topstories.json",{signal:AbortSignal.timeout(8000)});var ids=await r.json();ids=ids.slice(0,n);var ps=ids.map(function(id){return fetch("https://hacker-news.firebaseio.com/v0/item/"+id+".json",{signal:AbortSignal.timeout(5000)}).then(function(r){return r.json();}).catch(function(){return null;});});var items=await Promise.all(ps);return items.filter(function(h){return h&&h.title&&h.type==="story";}).map(function(h){return{title:h.title||"",url:h.url||"https://news.ycombinator.com/item?id="+h.id,desc:(h.text||"").replace(/<[^>]+>/g,"").slice(0,200),source:"HN热门",srcCls:"sr-hf",time:(h.time||0)*1000,score:h.score||0,author:h.by||""};});}
async function d(t,n){n=n||6;var r=await fetch("https://dev.to/api/articles?tag="+encodeURIComponent(t)+"&per_page="+n,{signal:AbortSignal.timeout(8000)});var jj=await r.json();return(jj||[]).map(function(a){return{title:a.title||"",url:a.url||"",desc:(a.description||"").slice(0,200),source:"DEV.to",srcCls:"sr-dv",time:new Date(a.published_at).getTime(),score:a.positive_reactions||0,author:(a.user&&a.user.username)||""};});}
async function a(q,n){n=n||4;var qs=q.split(" ").join("+AND+");var r=await fetch("https://export.arxiv.org/api/query?search_query=all:"+qs+"&max_results="+n+"&sortBy=submittedDate&sortOrder=descending",{signal:AbortSignal.timeout(10000)});var x=await r.text();var es=x.split("<entry>").slice(1);return es.map(function(e){var g=function(t){var m=e.match(new RegExp("<"+t+">([^<]*)<"));return m?m[1].trim():"";};var im=e.match(/<id>([^<]*)<\//);return{title:g("title").replace(/\n\s*/g," "),url:im?im[1]:"",desc:g("summary").replace(/\n\s*/g," ").slice(0,250),source:"ArXiv",srcCls:"sr-ax",time:new Date(g("published")).getTime(),score:0,author:""};});}
