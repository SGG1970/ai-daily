<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🤖 每日AI头条</title>
<style>
body{background:#070912;color:#e6eaf4;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;max-width:1100px;margin:0 auto;padding:16px}
.hdr{background:rgba(16,20,38,.6);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-radius:14px;border:1px solid rgba(255,255,255,.06);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
h1{font-size:18px;margin:0;background:linear-gradient(135deg,#7c5cfc,#00d4c8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:rgba(16,20,38,.55);color:#e6eaf4;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#7c5cfc,#6b4ce0);border:none;color:#fff;font-weight:600}
.btn-p:disabled{opacity:.5;cursor:wait}
.st{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.sc{background:rgba(16,20,38,.55);border-radius:8px;border:1px solid rgba(255,255,255,.06);text-align:center;padding:10px}
.sc .n{font-size:20px;font-weight:700}.sc .l{font-size:11px;color:rgba(255,255,255,.52)}
.sc0 .n{color:#ff6600}.sc1 .n{color:#7c5cfc}.sc2 .n{color:#00d4c8}.sc3 .n{color:#f472b6}
.tb{display:flex;gap:3px;margin-bottom:12px;background:rgba(16,20,38,.55);border-radius:8px;padding:3px;border:1px solid rgba(255,255,255,.06)}
.t{flex:1;padding:8px 10px;text-align:center;border:none;background:transparent;color:rgba(255,255,255,.52);font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit}
.t.av{color:#fff;background:linear-gradient(135deg,#7c5cfc,#6b4ce0)}
.t .b{display:inline-block;margin-left:4px;padding:0 6px;border-radius:6px;font-size:10px;background:rgba(255,255,255,.1)}
.fd{display:none}.fd.av{display:block}
.ld{text-align:center;padding:40px;color:rgba(255,255,255,.52)}
.sp{width:28px;height:28px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.08);border-top-color:#7c5cfc;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cd{display:block;padding:12px 16px;margin-bottom:6px;background:rgba(16,20,38,.55);border-radius:8px;border:1px solid rgba(255,255,255,.06);cursor:pointer;text-decoration:none;color:inherit}
.cd:hover{border-color:rgba(124,92,252,.2);transform:translateY(-1px)}
.cd .ti{font-size:13px;font-weight:600;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cd .ds{font-size:11px;color:rgba(255,255,255,.52);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cd .mt{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:10px;color:rgba(255,255,255,.28)}
.sr{padding:1px 6px;border-radius:3px;font-weight:600;font-size:9px}
.sh{background:rgba(255,102,0,.12);color:#ff6600}.sd{background:rgba(0,212,200,.1);color:#00d4c8}.shf{background:rgba(124,92,252,.1);color:#7c5cfc}
.sc{color:#fbbf24}.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2);color:#4ade80;padding:8px 16px;border-radius:7px;font-size:12px;z-index:999}
.toast-e{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.2);color:#f87171}
.ft{text-align:center;padding:14px 0;font-size:10px;color:rgba(255,255,255,.28);margin-top:14px;line-height:1.6}
.ft a{color:rgba(255,255,255,.52);text-decoration:none}
@media(max-width:640px){.st{grid-template-columns:repeat(2,1fr)}.t{font-size:11px;padding:6px}}
</style>
</head>
<body>
<div class="hdr"><h1>🤖 每日AI头条</h1><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="btn" id="dateDisplay" style="cursor:default;font-size:11px"></span><button class="btn btn-p" id="btnRefresh">🔄 刷新</button></div></div>
<div class="st"><div class="sc sc0"><div class="n" id="s0">0</div><div class="l">🔥 今日头条</div></div><div class="sc sc1"><div class="n" id="s1">0</div><div class="l">🤖 智能体</div></div><div class="sc sc2"><div class="n" id="s2">0</div><div class="l">⚙️ 工作流</div></div><div class="sc sc3"><div class="n" id="s3">0</div><div class="l">🚀 AI前沿</div></div></div>
<div class="tb" id="tabC"><button class="t av" data-c="0">🔥 今日头条 <span class="b" id="b0">0</span></button><button class="t" data-c="1">🤖 智能体 <span class="b" id="b1">0</span></button><button class="t" data-c="2">⚙️ 工作流 <span class="b" id="b2">0</span></button><button class="t" data-c="3">🚀 AI前沿 <span class="b" id="b3">0</span></button></div>
<div class="fd av" id="f0"></div><div class="fd" id="f1"></div><div class="fd" id="f2"></div><div class="fd" id="f3"></div>
<div class="ft"><span id="updateTime">加载中...</span><br><a href="https://news.ycombinator.com" target="_blank">HackerNews</a> · <a href="https://dev.to" target="_blank">DEV.to</a></div>
<div id="toast" style="display:none"></div>
<script>
function _fetch(url, ms) {
  ms = ms || 10000;
  return new Promise(function(res, rej) {
    var c = new AbortController();
    var t = setTimeout(function(){ c.abort(); }, ms);
    fetch(url, {signal:c.signal}).then(function(r){clearTimeout(t);res(r);}).catch(function(e){clearTimeout(t);rej(e);});
  });
}
var cats = ["今日头条","智能体","工作流","AI前沿"];
var data = [[],[],[],[]];
var tab = 0, loading = false;

async function hn(q, n) {
  try {
    var r = await _fetch("https://hn.algolia.com/api/v1/search?query="+encodeURIComponent(q)+"&tags=story&hitsPerPage="+(n||10),8000);
    var j = await r.json();
    return (j.hits||[]).map(function(h){return{title:h.title||"",url:h.url||"https://news.ycombinator.com/item?id="+h.objectID,desc:(h.story_text||"").replace(/<[^>]+>/g,"").slice(0,200),src:"HN",cls:"sh",time:new Date(h.created_at).getTime(),sc:h.points||0};});
  } catch(e){return [];}
}
async function dv(tag, n) {
  try {
    var r = await _fetch("https://dev.to/api/articles?tag="+encodeURIComponent(tag)+"&per_page="+(n||5),8000);
    var j = await r.json();
    return (j||[]).map(function(a){return{title:a.title||"",url:a.url||"",desc:(a.description||"").slice(0,200),src:"DEV",cls:"sd",time:new Date(a.published_at).getTime(),sc:a.positive_reactions||0};});
  } catch(e){return [];}
}
async function top(n) {
  try {
    var r = await _fetch("https://hacker-news.firebaseio.com/v0/topstories.json",8000);
    var ids = await r.json();
    ids = ids.slice(0,n||20);
    var all = await Promise.all(ids.map(function(id){return _fetch("https://hacker-news.firebaseio.com/v0/item/"+id+".json",5000).then(function(rr){return rr.json();}).catch(function(){return null;});}));
    return all.filter(function(h){return h&&h.title&&h.type==="story";}).map(function(h){return{title:h.title,url:h.url||"https://news.ycombinator.com/item?id="+h.id,desc:(h.text||"").replace(/<[^>]+>/g,"").slice(0,200),src:"HN热",cls:"shf",time:(h.time||0)*1000,sc:h.score||0};});
  } catch(e){return [];}
}
async function tr() {
  var r=[]; (await top(20)).forEach(function(x){r.push(x);});
  (await hn("artificial intelligence",10)).forEach(function(x){r.push(x);});
  (await hn("AI",10)).forEach(function(x){r.push(x);});
  (await dv("ai",8)).forEach(function(x){r.push(x);});
  return dedupe(r).sort(function(a,b){return(b.sc||0)-(a.sc||0);}).slice(0,30);
}
async function fk(kws) {
  var r=[];
  for(var i=0;i<kws.length;i++){
    var z=await Promise.all([hn(kws[i],6).catch(function(){return[];}),dv(kws[i],4).catch(function(){return[];})]);
    z[0].forEach(function(x){r.push(x);});z[1].forEach(function(x){r.push(x);});
  }
  return dedupe(r).sort(function(a,b){return(b.sc||0)-(a.sc||0);}).slice(0,30);
}
function dedupe(arr){var s={};return arr.filter(function(i){if(!i.title)return false;var k=i.title.slice(0,40);if(s[k])return false;s[k]=true;return true;});}

function rd(i){
  var el=document.getElementById("f"+i),items=data[i]||[];
  if(!items.length){el.innerHTML='<div style="text-align:center;padding:30px;color:rgba(255,255,255,.52)">暂无<br><button class="btn btn-p" onclick="rf()" style="margin-top:10px">🔄 获取</button></div>';return;}
  var h="";
  items.forEach(function(a){
    var ta=da(a.time),ht="";
    if(a.sc>=100)ht='<span style="color:#ff6600;font-size:10px">🔥热门 </span>'; else if(a.sc>=30)ht='<span style="color:#fbbf24;font-size:10px">⭐推荐 </span>';
    h+='<a class="cd" href="'+a.url+'" target="_blank"><div class="ti">'+ht+esc(a.title)+'</div>'+(a.desc?'<div class="ds">'+esc(a.desc.slice(0,150))+'</div>':'')+'<div class="mt"><span class="sr '+a.cls+'">'+a.src+'</span>'+(a.sc?'<span class="sc">⭐'+a.sc+'</span>':'')+'<span>'+ta+'</span></div></a>';
  });
  el.innerHTML=h;
}
function us(){for(var i=0;i<4;i++){document.getElementById("s"+i).textContent=data[i].length;document.getElementById("b"+i).textContent=data[i].length;}}
function sw(i){tab=i;document.querySelectorAll(".t").forEach(function(t,idx){t.classList.toggle("av",idx===i);});document.querySelectorAll(".fd").forEach(function(f,idx){f.classList.toggle("av",idx===i);});rd(i);}

async function rf(){
  if(loading)return;loading=true;
  var btn=document.getElementById("btnRefresh");btn.disabled=true;btn.textContent="⏳...";
  for(var i=0;i<4;i++)document.getElementById("f"+i).innerHTML='<div class="ld"><div class="sp"></div><p>'+cats[i]+'...</p></div>';
  // 全局超时保护：20秒后强制结束
  var globalTimer = setTimeout(function(){
    tt("⏰ 请求超时，请检查网络或按F12看控制台错误","e");
    if(btn){btn.disabled=false;btn.textContent="🔄 刷新";}
    loading=false;
  }, 20000);
  try{
    var t=Date.now();
    var rs=await Promise.all([tr(),fk(["AI agent","autonomous agent","MCP","function calling","multi-agent"]),fk(["AI workflow","LangChain","RAG","prompt engineering","AI automation"]),fk(["large language model","GPT","multimodal","AGI","AI research"])]);
    clearTimeout(globalTimer);
    data=rs;for(var i=0;i<4;i++)rd(i);us();ut();
    var total=rs.reduce(function(a,b){return a+b.length;},0);
    tt("✅ "+total+" 条 ("+((Date.now()-t)/1000).toFixed(1)+"s)");try{localStorage.setItem("ai6",JSON.stringify({d:rs,t:Date.now()}));}catch(e){}
  }catch(e){clearTimeout(globalTimer);console.error(e);tt("❌ "+e.message,"e");}
  btn.disabled=false;btn.textContent="🔄 刷新";loading=false;
}

function da(ts){if(!ts)return"";var d=Date.now()-ts;if(d<60000)return"刚刚";var m=Math.floor(d/60000);if(m<60)return m+"分钟前";var h=Math.floor(m/60);if(h<24)return h+"小时前";return Math.floor(h/24)+"天前";}
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function tt(m,t){var e=document.getElementById("toast");e.textContent=m;e.className="toast"+(t==="e"?" toast-e":"");e.style.display="block";setTimeout(function(){e.style.display="none";},3000);}
function ut(){document.getElementById("updateTime").textContent="最新: "+new Date().toLocaleString("zh-CN");}

document.addEventListener("DOMContentLoaded",async function(){
  document.getElementById("dateDisplay").textContent=new Date().toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"long"});
  document.querySelectorAll(".t").forEach(function(t,i){t.addEventListener("click",function(){sw(i);});});
  document.getElementById("btnRefresh").addEventListener("click",rf);
  var ok=false;
  try{var c=localStorage.getItem("ai6");if(c){var p=JSON.parse(c);if(Date.now()-p.t<3600000&&p.d&&p.d.length===4){data=p.d;for(var i=0;i<4;i++)rd(i);us();ut();ok=true;}}}catch(e){}
  if(!ok)await rf();
  setInterval(rf,1800000);
});
</script>
</body>
</html>
