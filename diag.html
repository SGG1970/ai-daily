<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>🔍 API诊断工具</title>
<style>
body{background:#070912;color:#e6eaf4;font-family:monospace;padding:20px;max-width:600px;margin:0 auto}
h1{font-size:18px;margin-bottom:20px}
.test{border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;margin-bottom:8px;background:rgba(16,20,38,.55)}
.test h3{margin:0 0 6px;font-size:14px}
.test .status{padding:4px 8px;border-radius:4px;font-size:12px;display:inline-block}
.pass{background:rgba(34,197,94,.15);color:#4ade80}
.fail{background:rgba(239,68,68,.15);color:#f87171}
.wait{background:rgba(234,179,8,.15);color:#eab308}
.info{font-size:11px;color:rgba(255,255,255,.52);margin-top:4px}
button{padding:8px 20px;border-radius:7px;border:none;background:linear-gradient(135deg,#7c5cfc,#6b4ce0);color:#fff;font-size:13px;cursor:pointer;margin:10px 0}
</style></head>
<body>
<h1>🔍 API连通性诊断</h1>
<div id="results"></div>
<button onclick="runTests()">🔄 重新测试</button>
<script>
async function testAPI(name, url, timeout) {
  var div = document.createElement("div");
  div.className = "test";
  div.innerHTML = "<h3>" + name + "</h3><span class='status wait'>⏳ 测试中...</span>";
  document.getElementById("results").appendChild(div);
  var statusEl = div.querySelector(".status");
  var infoEl = document.createElement("div");
  infoEl.className = "info";
  div.appendChild(infoEl);
  
  var start = Date.now();
  try {
    var controller = new AbortController();
    var timer = setTimeout(function(){ controller.abort(); }, timeout || 8000);
    var r = await fetch(url, {signal: controller.signal});
    clearTimeout(timer);
    var text = await r.text();
    var elapsed = Date.now() - start;
    statusEl.className = "status pass";
    statusEl.textContent = "✅ " + r.status + " (" + text.length + " bytes, " + elapsed + "ms)";
    infoEl.textContent = "URL: " + url;
  } catch(e) {
    var elapsed = Date.now() - start;
    statusEl.className = "status fail";
    statusEl.textContent = "❌ " + e.name + ": " + e.message.substring(0,60);
    infoEl.textContent = "URL: " + url + " (" + elapsed + "ms)";
  }
}

async function runTests() {
  document.getElementById("results").innerHTML = "";
  
  // 1. 基础检查
  var base = document.createElement("div");
  base.className = "test";
  base.innerHTML = "<h3>📋 环境检查</h3>";
  var info = document.createElement("div");
  info.className = "info";
  info.innerHTML = "AbortController: " + (typeof AbortController !== "undefined" ? "✅" : "❌") + "<br>"
    + "fetch: " + (typeof fetch !== "undefined" ? "✅" : "❌") + "<br>"
    + "Promise: " + (typeof Promise !== "undefined" ? "✅" : "❌") + "<br>"
    + "UserAgent: " + navigator.userAgent.substring(0,80);
  base.appendChild(info);
  document.getElementById("results").appendChild(base);
  
  // 2. 测试各个API
  await testAPI("HackerNews Algolia", "https://hn.algolia.com/api/v1/search?query=AI&tags=story&hitsPerPage=2", 10000);
  await testAPI("HN Firebase TopStories", "https://hacker-news.firebaseio.com/v0/topstories.json", 10000);
  await testAPI("HN Firebase Item", "https://hacker-news.firebaseio.com/v0/item/48620090.json", 8000);
  await testAPI("DEV.to", "https://dev.to/api/articles?tag=ai&per_page=2", 10000);
  
  // 3. 结论
  var conclusion = document.createElement("div");
  conclusion.className = "test";
  conclusion.innerHTML = "<h3>📊 结论</h3>";
  var passes = document.querySelectorAll(".pass").length;
  var fails = document.querySelectorAll(".fail").length;
  var conclusionInfo = document.createElement("div");
  conclusionInfo.className = "info";
  if (fails === 0) {
    conclusionInfo.textContent = "✅ 所有API都能正常访问！问题不在API连接上。";
  } else {
    conclusionInfo.textContent = "❌ " + fails + "个API连接失败，这可能是页面不工作的原因。";
  }
  conclusion.appendChild(conclusionInfo);
  document.getElementById("results").appendChild(conclusion);
}

runTests();
</script></body></html>
